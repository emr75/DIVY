name: Django Unit Tests

on:
  pull_request:
    branches: ["develop", "main"]


permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage
        run: |
          cd marketproj
          coverage run manage.py test
          coverage report -m > ../coverage.txt 
          coverage xml -o ../coverage.xml

      - name: Install xml2js
        run: npm install xml2js

      - name: Post coverage summary comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const xml2js = require('xml2js');

            // Read XML
            const xml = fs.readFileSync('coverage.xml', 'utf8');

            // Parse XML
            const parser = new xml2js.Parser();
            const result = await parser.parseStringPromise(xml);

            // Extract total stats
            const coverage = result.coverage.$;
            const lineRate = (parseFloat(coverage['line-rate']) * 100).toFixed(2);
            const branchRate = (parseFloat(coverage['branch-rate']) * 100).toFixed(2);
            const totalLines = coverage['lines-valid'];
            const linesCovered = coverage['lines-covered'];

            // Prepare clean Markdown
            let body = `### Django Test Coverage Report\n\n`;
            body += `**Total Line Coverage:** ${lineRate}%\n\n`;
            body += `**Branch Coverage:** ${branchRate}%\n\n`;
            body += `**Lines Covered:** ${linesCovered} / ${totalLines}\n\n`;

            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
